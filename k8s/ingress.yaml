apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: book-library-ingress
  namespace: book-library
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
