apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: book-library
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mastur421/book-library-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /api/authors
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
