<h1>{{ isEditMode() ? 'Edit Book' : 'Add New Book' }}</h1>

@if (loading()) {
  <p class="state-message">Loading...</p>
}

@if (error()) {
  <p class="state-message state-message--error">{{ error() }}</p>
}

<div class="form-card">
  <form (ngSubmit)="submit()">
    <div class="form-field">
      <label for="title">Book Title</label>
      <input id="title" type="text" [ngModel]="title()" (ngModelChange)="title.set($event)" name="title" required maxlength="100">
    </div>

    <div class="form-field">
      <label for="genre">Genre</label>
      <input id="genre" type="text" [ngModel]="genre()" (ngModelChange)="genre.set($event)" name="genre" required maxlength="50">
    </div>

    <div class="form-field">
      <label for="averageRating">Average Rating</label>
      <input id="averageRating" type="number" [ngModel]="averageRating()" (ngModelChange)="averageRating.set($event)" name="averageRating" min="0" max="5" step="0.1" required>
    </div>

    <div class="form-field">
      <label for="authorId">Author</label>
      <select id="authorId" [ngModel]="authorId()" (ngModelChange)="authorId.set($event)" name="authorId" required>
        <option [value]="null">Select an author...</option>
        @for (author of authors(); track author.id) {
          <option [value]="author.id">{{ author.name }} {{ author.surname }} ({{ author.country }})</option>
        }
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary">{{ isEditMode() ? 'Update Book' : 'Create Book' }}</button>
      <a routerLink="/books" class="btn btn--secondary">Cancel</a>
    </div>
  </form>
</div>
